services:

  # ── SpacetimeDB ─────────────────────────────────────────────────────────────
  spacetimedb:
    image: clockworklabs/spacetime:v2.2.1
    container_name: letschat-dev-spacetimedb
    command: start
    ports:
      - "4300:3000"
    volumes:
      - spacetimedb_dev_home:/home/spacetime
    restart: unless-stopped

  # ── LiveKit ──────────────────────────────────────────────────────────────────
  livekit:
    image: livekit/livekit-server:latest
    container_name: letschat-dev-livekit
    command: --config /etc/livekit.yaml
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7881:7881/udp"
      - "7882:7882/udp"
    volumes:
      - ./livekit/config.yaml:/etc/livekit.yaml:ro
    restart: unless-stopped

  # ── PostgreSQL (core-api: ASP.NET Core Identity + auth database) ──────────────
  postgres:
    image: postgres:17-alpine
    container_name: letschat-dev-postgres
    environment:
      POSTGRES_USER: letschat
      POSTGRES_PASSWORD: letschat
      POSTGRES_DB: auth
    ports:
      - "5433:5432"   # core-api connects here  →  AUTH_DATABASE_URL (host 5433)
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U letschat -d auth"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ── Archive replication worker (storage-tiering, plan 2) ─────────────────────
  # Mirrors the SpacetimeDB archive_* views into the `archive` database. core-api
  # owns that database + schema (EF migrations on its startup); the worker waits
  # for the schema, then writes the mirror. Opt-in for dev: enable with the
  # `archive` profile (`docker compose --profile archive up -d`) — most local work
  # doesn't need it. One-time bootstrap: an instance admin must register the
  # worker's identity via `set_archive_service_identity` (see the worker logs).
  archive-worker:
    build:
      context: .
      dockerfile: archive-worker/Dockerfile
    container_name: letschat-dev-archive-worker
    profiles: ["archive"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPACETIMEDB_URI: ws://spacetimedb:3000
      SPACETIMEDB_MODULE_NAME: letschat
      ARCHIVE_DATABASE_URL: Host=postgres;Port=5432;Database=archive;Username=letschat;Password=letschat
      ARCHIVE_WORKER_TOKEN_FILE: /data/archive-worker.token
    volumes:
      - archive_worker_dev_data:/data
    restart: unless-stopped

  # ── Mailpit (core-api: dev SMTP catcher for email verification) ──────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: letschat-dev-mailpit
    ports:
      - "1025:1025"   # SMTP   →  core-api sends here (SMTP_HOST/SMTP_PORT)
      - "8025:8025"   # Web UI →  http://localhost:8025  (inspect sent emails)
    restart: unless-stopped

  # ── MinIO ────────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: letschat-dev-minio
    command: server /data --console-address ":9001"
    ports:
      - "4390:9000"   # S3 API  →  http://localhost:4390
      - "4391:9001"   # Web UI  →  http://localhost:4391  (login: minioadmin / minioadmin)
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_dev_data:/data
    restart: unless-stopped

  # ── MinIO bucket init ─────────────────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: letschat-dev-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
        until mc alias set local http://minio:9000 minioadmin minioadmin 2>/dev/null; do
          echo 'waiting for MinIO...'; sleep 2;
        done;
        mc mb --ignore-existing local/letschat-files;
        echo 'bucket ready';
      "
    restart: "no"

volumes:
  spacetimedb_dev_home:
  minio_dev_data:
  postgres_dev_data:
  archive_worker_dev_data:

