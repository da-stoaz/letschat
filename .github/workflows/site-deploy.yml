name: Deploy site

# The marketing site (`site/`, Astro `output: 'static'`) bakes the version badge
# and star count into the HTML at BUILD time. Cloudflare Pages won't rebuild on
# its own when a new release ships, so those values go stale. This pings a
# Cloudflare Pages Deploy Hook whenever a release is published, so the site
# rebuilds and re-fetches the now-current version/stars.
#
# Setup (one-time):
#   1. Cloudflare Pages project → Settings → Builds & deployments → Deploy hooks
#      → create a hook (branch: main). Copy its URL.
#   2. GitHub repo → Settings → Secrets and variables → Actions → add secret
#      CLOUDFLARE_PAGES_DEPLOY_HOOK with that URL.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  trigger-rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Cloudflare Pages deploy hook
        env:
          HOOK: ${{ secrets.CLOUDFLARE_PAGES_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "::warning::CLOUDFLARE_PAGES_DEPLOY_HOOK not set — skipping site rebuild."
            exit 0
          fi
          curl -fsS -X POST "$HOOK" && echo "Triggered Cloudflare Pages rebuild."
