name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-tauri:
    environment: production
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            tauri-args: --target universal-apple-darwin

          - platform: windows-latest
            rust-targets: ""
            tauri-args: ""

          - platform: ubuntu-22.04
            rust-targets: ""
            tauri-args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust build cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Prepare Apple API key (macOS)
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          key_path="$RUNNER_TEMP/AuthKey_${{ secrets.APPLE_API_KEY }}.p8"

          if [ -n "${APPLE_API_KEY_P8:-}" ]; then
            printf '%s' "$APPLE_API_KEY_P8" > "$key_path"
          elif [ -n "${APPLE_API_KEY_P8_BASE64:-}" ]; then
            # macOS runners use BSD base64 (-D)
            printf '%s' "$APPLE_API_KEY_P8_BASE64" | base64 -D > "$key_path"
          else
            echo "Missing APPLE_API_KEY_P8 or APPLE_API_KEY_P8_BASE64 secret." >&2
            exit 1
          fi

          if ! grep -q "BEGIN PRIVATE KEY" "$key_path"; then
            {
              echo "-----BEGIN PRIVATE KEY-----"
              cat "$key_path"
              echo "-----END PRIVATE KEY-----"
            } > "${key_path}.tmp"
            mv "${key_path}.tmp" "$key_path"
          fi

          if ! openssl pkey -in "$key_path" -noout >/dev/null 2>&1; then
            echo "Invalid Apple API key content. Remove any trailing shell '%' and paste exact key content." >&2
            exit 1
          fi

          chmod 600 "$key_path"
          echo "APPLE_API_KEY_PATH=$key_path" >> "$GITHUB_ENV"

      - name: Import Apple signing certificate (macOS)
        if: matrix.platform == 'macos-latest'
        uses: apple-actions/import-codesign-certs@v5
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Detect Apple signing identity from keychain (macOS)
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          # Auto-detect the identity from whatever certificate was just imported.
          # This avoids any whitespace / quoting issues with the secret value.
          IDENTITY=$(security find-identity -v -p codesigning \
            | grep -o '"[^"]*"' | head -1 | tr -d '"')
          if [ -z "$IDENTITY" ]; then
            echo "ERROR: No code-signing identity found after certificate import." >&2
            security find-identity -v
            exit 1
          fi
          echo "APPLE_SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Build and release (macOS signed)
        if: matrix.platform == 'macos-latest'
        timeout-minutes: 25
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}

        with:
          tagName: v__VERSION__
          releaseName: LetsChat v__VERSION__
          releaseBody: |
            ## LetsChat v__VERSION__

            ### Downloads
            | Platform | File |
            |----------|------|
            | macOS (Universal) | `.dmg` |
            | Windows | `.msi` (recommended) · `.exe` (NSIS) |
            | Linux | `.AppImage` · `.deb` |

            > **Note:** macOS builds are signed and notarized. Windows users may still see SmartScreen warnings until reputation builds.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.tauri-args }}

      - name: Build and release (non-mac)
        if: matrix.platform != 'macos-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: LetsChat v__VERSION__
          releaseBody: |
            ## LetsChat v__VERSION__

            ### Downloads
            | Platform | File |
            |----------|------|
            | macOS (Universal) | `.dmg` |
            | Windows | `.msi` (recommended) · `.exe` (NSIS) |
            | Linux | `.AppImage` · `.deb` |

            > **Note:** macOS builds are signed and notarized. Windows users may still see SmartScreen warnings until reputation builds.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.tauri-args }}
