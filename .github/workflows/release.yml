name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-backend:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push auth-service image
        uses: docker/build-push-action@v6
        with:
          context: ./auth-service
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/letschat-auth:latest
            ghcr.io/${{ github.repository_owner }}/letschat-auth:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./server -> target

      - name: Build SpacetimeDB module (WASM)
        run: cargo build --manifest-path server/Cargo.toml --target wasm32-unknown-unknown --release

      - name: Build and push module image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile.module
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/letschat-module:latest
            ghcr.io/${{ github.repository_owner }}/letschat-module:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-tauri:
    environment: production
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            tauri-args: --target universal-apple-darwin
          - platform: windows-latest
            rust-targets: ""
            tauri-args: ""
          - platform: windows-latest
            rust-targets: aarch64-pc-windows-msvc
            tauri-args: --target aarch64-pc-windows-msvc
          - platform: ubuntu-22.04
            rust-targets: ""
            tauri-args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: npm ci

      - name: Write Apple API key to disk
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          key_path="$RUNNER_TEMP/AuthKey_${{ secrets.APPLE_API_KEY }}.p8"
          printf '%s' "$APPLE_API_KEY_P8" > "$key_path"
          chmod 600 "$key_path"
          echo "APPLE_API_KEY_PATH=$key_path" >> "$GITHUB_ENV"

      - name: Import Apple certificate
        if: matrix.platform == 'macos-latest'
        uses: apple-actions/import-codesign-certs@v5
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Detect signing identity
        if: matrix.platform == 'macos-latest'
        run: |
          IDENTITY=$(security find-identity -v -p codesigning \
            | grep "Developer ID Application" \
            | grep -o '"[^"]*"' | head -1 | tr -d '"')
          if [ -z "$IDENTITY" ]; then
            echo "ERROR: No 'Developer ID Application' identity found." >&2
            security find-identity -v -p codesigning >&2
            exit 1
          fi
          echo "Using identity: $IDENTITY"
          echo "APPLE_SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        timeout-minutes: 30
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
        with:
          tagName: v__VERSION__
          releaseName: LetsChat v__VERSION__
          releaseBody: |
            ## LetsChat v__VERSION__

            | Platform | Download |
            |----------|----------|
            | macOS Universal | `.dmg` |
            | Windows x64 | `.msi` · `.exe` |
            | Windows ARM64 | `.msi` |
            | Linux | `.AppImage` · `.deb` |
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.tauri-args }}

      - name: Verify macOS signature
        if: matrix.platform == 'macos-latest'
        run: |
          APP=$(find src-tauri/target/universal-apple-darwin/release/bundle/macos \
            -name "*.app" | head -1)
          codesign --verify --deep --strict --verbose=2 "$APP"
          spctl --assess --type exec --verbose "$APP"
