name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-tauri:
    environment: production
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            tauri-args: --target universal-apple-darwin
          - platform: windows-latest
            rust-targets: ""
            tauri-args: ""
          - platform: windows-latest
            rust-targets: aarch64-pc-windows-msvc
            tauri-args: --target aarch64-pc-windows-msvc
          - platform: ubuntu-22.04
            rust-targets: ""
            tauri-args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: npm ci

      - name: Import Apple certificate
        if: matrix.platform == 'macos-latest'
        uses: apple-actions/import-codesign-certs@v5
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Detect signing identity
        if: matrix.platform == 'macos-latest'
        run: |
          IDENTITY=$(security find-identity -v -p codesigning | grep -o '"[^"]*"' | head -1 | tr -d '"')
          echo "APPLE_SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        timeout-minutes: 20
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
        with:
          tagName: v__VERSION__
          releaseName: LetsChat v__VERSION__
          releaseBody: |
            ## LetsChat v__VERSION__

            | Platform | Download |
            |----------|----------|
            | macOS Universal | `.dmg` |
            | Windows x64 | `.msi` · `.exe` |
            | Linux | `.AppImage` · `.deb` |

            > macOS: App is signed. First launch may require right-click → Open to bypass Gatekeeper.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.tauri-args }}
