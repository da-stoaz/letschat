name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            tauri-args: --target universal-apple-darwin

          - platform: windows-latest
            rust-targets: ''
            tauri-args: ''

          - platform: ubuntu-22.04
            rust-targets: ''
            tauri-args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust build cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_AUTH_SERVICE_URL: ${{ secrets.VITE_AUTH_SERVICE_URL }}
          VITE_SPACETIMEDB_URI: ${{ secrets.VITE_SPACETIMEDB_URI }}
          VITE_SPACETIMEDB_DATABASE: ${{ secrets.VITE_SPACETIMEDB_DATABASE }}
          VITE_LIVEKIT_URL: ${{ secrets.VITE_LIVEKIT_URL }}
        with:
          tagName: v__VERSION__
          releaseName: LetsChat v__VERSION__
          releaseBody: |
            ## LetsChat v__VERSION__

            ### Downloads
            | Platform | File |
            |----------|------|
            | macOS (Universal) | `.dmg` |
            | Windows | `.msi` (recommended) · `.exe` (NSIS) |
            | Linux | `.AppImage` · `.deb` |

            > **Note:** Builds are currently unsigned. macOS users may need to right-click → Open to bypass Gatekeeper. Windows users may see a SmartScreen warning — click "More info" → "Run anyway".
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.tauri-args }}
