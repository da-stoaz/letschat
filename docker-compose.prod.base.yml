services:
  # ── SpacetimeDB ─────────────────────────────────────────────────────────────
  # Host port is LOOPBACK-only (127.0.0.1:44300) — for `spacetime publish` and
  # a host-level reverse proxy. Public clients reach the chat subdomain through
  # the tunnel/Caddy (which use the Docker service name, not this host port).
  spacetimedb:
    # Pinned (not :latest) so prod runs a known server version. Must stay on the
    # same 2.5.x line as the `spacetimedb` crate the module is built against and
    # the `spacetimedb` npm SDK — a minor-version skew breaks module load and
    # the client connection. `:latest` is cached per-host and never auto-refreshes.
    image: clockworklabs/spacetime:v2.5.0
    command: start
    container_name: letschat-spacetimedb
    ports:
      - "127.0.0.1:44300:3000"
    volumes:
      - spacetimedb_home:/home/spacetime
    # spacetimedb-config-init drops our WebSocket keepalive config.toml into the
    # data dir (in the shared volume) before the server starts.
    depends_on:
      spacetimedb-config-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/3000'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ── SpacetimeDB config init ──────────────────────────────────────────────────
  # One-shot: installs config.prod.toml as {data-dir}/config.toml in the shared
  # spacetimedb_home volume, then exits. Runs as the image's `spacetime` user so
  # the file lands with correct ownership. This indirection is required because a
  # direct bind mount of config.toml would make Docker create the parent dirs as
  # root, and the non-root server then can't create its log dir (startup panic).
  # The WebSocket tuning (raised idle-timeout) keeps the chat connection alive
  # through tunnel/proxy Pong delays — see spacetimedb/config.prod.toml.
  spacetimedb-config-init:
    image: clockworklabs/spacetime:v2.5.0
    container_name: letschat-spacetimedb-config-init
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        mkdir -p /home/spacetime/.local/share/spacetime/data &&
        cp /config/config.toml /home/spacetime/.local/share/spacetime/data/config.toml
    volumes:
      - spacetimedb_home:/home/spacetime
      - ./spacetimedb/config.prod.toml:/config/config.toml:ro
    restart: "no"

  # ── PostgreSQL (auth database) ──────────────────────────────────────────────
  # Backs core-api's ASP.NET Core Identity store. Only reachable on the
  # internal Docker network; never published on a host port.
  postgres:
    image: postgres:17-alpine
    container_name: letschat-postgres
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-letschat}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB:-auth}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-letschat} -d $${POSTGRES_DB:-auth}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  # ── core-api (.NET / ASP.NET Core Identity) ─────────────────────────────────
  # Public HTTP listener (AUTH_BIND) is published on a host LOOPBACK port
  # (127.0.0.1:8787). The bundled cloudflared/Caddy reach it over the Docker
  # network by service name and don't need this; it exists so a reverse proxy
  # or tunnel running NATIVELY ON THE HOST (e.g. an existing cloudflared serving
  # other apps) can point its ingress at http://localhost:8787. Loopback-only,
  # so it is never directly exposed to the internet.
  #
  # Admin Razor pages (ADMIN_BIND) are bound to a SEPARATE container port and
  # the host mapping is loopback-only (127.0.0.1:48788). Reach the panel from
  # an operator workstation via SSH port forward:
  #   ssh -L 8788:127.0.0.1:48788 your-host
  # then open http://localhost:8788/admin in a browser.
  core-api:
    image: ghcr.io/da-stoaz/letschat-core-api:latest
    container_name: letschat-core-api
    ports:
      - "127.0.0.1:8787:8787"
      - "127.0.0.1:48788:8788"
    environment:
      AUTH_BIND: "0.0.0.0:8787"
      ADMIN_BIND: "0.0.0.0:8788"
      AUTH_DATABASE_URL: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-auth};Username=${POSTGRES_USER:-letschat};Password=${POSTGRES_PASSWORD}"
      AUTH_JWT_SECRET: "${AUTH_JWT_SECRET}"
      AUTH_ADMIN_API_KEY: "${AUTH_ADMIN_API_KEY:-}"

      LIVEKIT_API_KEY: "${LIVEKIT_API_KEY}"
      LIVEKIT_API_SECRET: "${LIVEKIT_API_SECRET}"

      MINIO_INTERNAL_ENDPOINT: "http://minio:44390"
      MINIO_PUBLIC_ENDPOINT: "${MINIO_PUBLIC_ENDPOINT}"
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY}"
      MINIO_BUCKET: "letschat-files"

      DISCOVERY_SPACETIMEDB_URI: "${DISCOVERY_SPACETIMEDB_URI}"
      DISCOVERY_AUTH_URL: "${DISCOVERY_AUTH_URL}"
      DISCOVERY_LIVEKIT_URL: "${DISCOVERY_LIVEKIT_URL}"
      DISCOVERY_DATABASE: "${DISCOVERY_DATABASE}"

      # Optional version overrides — by default both fall back to the
      # backend's compiled version (see /.well-known/letschat.json).
      RECOMMENDED_CLIENT_VERSION: "${RECOMMENDED_CLIENT_VERSION:-}"
      MIN_CLIENT_VERSION: "${MIN_CLIENT_VERSION:-}"

      # Initial admin for the Razor control panel.
      ADMIN_BOOTSTRAP_USERNAME: "${ADMIN_BOOTSTRAP_USERNAME:-}"
      ADMIN_BOOTSTRAP_PASSWORD: "${ADMIN_BOOTSTRAP_PASSWORD:-}"
      ADMIN_BOOTSTRAP_EMAIL: "${ADMIN_BOOTSTRAP_EMAIL:-admin@letschat.local}"

      REQUIRE_EMAIL_CONFIRMATION: "${REQUIRE_EMAIL_CONFIRMATION:-true}"
      REQUIRE_ADMIN_APPROVAL: "${REQUIRE_ADMIN_APPROVAL:-false}"

      EMAIL_SENDER: "${EMAIL_SENDER:-smtp}"
      SMTP_HOST: "${SMTP_HOST}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
      SMTP_USE_STARTTLS: "${SMTP_USE_STARTTLS:-true}"
      EMAIL_FROM_ADDRESS: "${EMAIL_FROM_ADDRESS}"
      EMAIL_FROM_NAME: "${EMAIL_FROM_NAME:-LetsChat}"

      RATE_LIMIT_PERMIT: "${RATE_LIMIT_PERMIT:-10}"
      RATE_LIMIT_WINDOW_SECONDS: "${RATE_LIMIT_WINDOW_SECONDS:-300}"
    depends_on:
      postgres:
        condition: service_healthy
      spacetimedb:
        condition: service_started
      minio:
        condition: service_started
    restart: unless-stopped

  # ── Legacy auth-service data → core-api Postgres migrator ───────────────────
  # Profile-gated one-shot. Reads /data/auth.db (the legacy auth-service SQLite
  # volume, mounted read-only) and writes ASP.NET Core Identity rows into the
  # core-api Postgres `auth` database. Idempotent: re-running skips users that
  # already exist by username or SpacetimeDB identity.
  #
  # Trigger explicitly during the cutover from auth-service to core-api:
  #   docker compose -f docker-compose.prod.base.yml \
  #     --profile migration run --rm core-api-migrator
  # then remove the now-stale auth_data volume.
  core-api-migrator:
    image: ghcr.io/da-stoaz/letschat-core-api-migrator:latest
    container_name: letschat-core-api-migrator
    profiles: ["migration"]
    environment:
      AUTH_DATABASE_URL: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-auth};Username=${POSTGRES_USER:-letschat};Password=${POSTGRES_PASSWORD}"
    volumes:
      - auth_data:/data:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── SpacetimeDB module init ──────────────────────────────────────────────────
  # Publishes the server module on first start and after updates.
  # Waits for SpacetimeDB to be healthy, then exits. Docker restarts it on
  # failure so transient network errors are retried automatically.
  module-init:
    image: ghcr.io/da-stoaz/letschat-module:latest
    container_name: letschat-module-init
    command: "publish --server http://spacetimedb:3000 letschat --bin-path /module/letschat_server.wasm --yes"
    depends_on:
      spacetimedb:
        condition: service_healthy
    restart: on-failure

  # ── LiveKit ──────────────────────────────────────────────────────────────────
  # Signalling (44380, HTTP/WS) is LOOPBACK-only — fronted by the tunnel/Caddy
  # (Docker service name) or a host proxy (127.0.0.1:44380), never public.
  # Media MUST stay publicly reachable and router-forwarded: 44382/udp (primary,
  # udp_port) and 44381/tcp (fallback, tcp_port) — see livekit/config.prod.yaml.
  livekit:
    image: livekit/livekit-server:latest
    container_name: letschat-livekit
    command: --config /etc/livekit.yaml
    ports:
      - "127.0.0.1:44380:44380"
      - "44381:44381"
      - "44382:44382/udp"
    volumes:
      - ./livekit/config.prod.yaml:/etc/livekit.yaml:ro
    restart: unless-stopped

  # ── MinIO (file storage) ─────────────────────────────────────────────────────
  # Both host ports are LOOPBACK-only. 44390 (S3 API) is reached by clients via
  # presigned URLs on the files.<domain> proxy route, not this host port; a host
  # proxy uses 127.0.0.1:44390. 44391 (admin console) must never be public.
  minio:
    image: minio/minio:latest
    container_name: letschat-minio
    command: server /data --address ":44390" --console-address ":44391"
    ports:
      - "127.0.0.1:44390:44390"
      - "127.0.0.1:44391:44391"
    environment:
      MINIO_ROOT_USER: "${MINIO_ACCESS_KEY}"
      MINIO_ROOT_PASSWORD: "${MINIO_SECRET_KEY}"
      # Browser clients on app.<domain> fetch() presigned URLs from files.<domain>;
      # that cross-origin read needs CORS. Default "*" works; pin it to the web
      # origin (e.g. https://app.example.com) to lock it down. Desktop is unaffected.
      MINIO_API_CORS_ALLOW_ORIGIN: "${MINIO_CORS_ALLOW_ORIGIN:-*}"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  # ── MinIO bucket init ────────────────────────────────────────────────────────
  # Runs once on startup and ensures the letschat-files bucket exists.
  minio-init:
    image: minio/mc:latest
    container_name: letschat-minio-init
    depends_on:
      - minio
    environment:
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY}"
    entrypoint: >
      /bin/sh -c "
        until mc alias set local http://minio:44390 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY 2>/dev/null; do
          echo 'waiting for MinIO...'; sleep 2;
        done;
        mc mb --ignore-existing local/letschat-files;
        echo 'bucket ready';
      "
    restart: "no"

  # ── Web client (hosted browser SPA) ──────────────────────────────────────────
  # Builds the React/Vite bundle with this deployment's connect URL baked in
  # (VITE_WEB_CONNECT_URL) so a browser visiting app.<domain> auto-discovers the
  # instance and skips the desktop "pick a server" setup. Self-contained static
  # file server (no SSR runtime to crash) — reached by service name `web:80`
  # from Caddy or the Cloudflare Tunnel. Loopback-only host port for debugging.
  web:
    build:
      context: .
      dockerfile: deploy/web/Dockerfile
      args:
        VITE_WEB_CONNECT_URL: "${VITE_WEB_CONNECT_URL}"
        VITE_WEB_WS_COMPRESSION: "${VITE_WEB_WS_COMPRESSION:-gzip}"
    container_name: letschat-web
    ports:
      - "127.0.0.1:44310:80"
    restart: unless-stopped

volumes:
  spacetimedb_home:
  postgres_data:
  # Retained ONLY for the one-time migration from the legacy Rust auth-service.
  # Safe to remove (`docker volume rm letschat_auth_data`) once the migrator
  # has been run and core-api is verified.
  auth_data:
  minio_data:
