services:
  # ── SpacetimeDB ─────────────────────────────────────────────────────────────
  # Host port 44300 is optional admin access. Public clients should use the
  # chat subdomain through either tunnel or reverse proxy.
  spacetimedb:
    image: clockworklabs/spacetime:latest
    command: start
    container_name: letschat-spacetimedb
    ports:
      - "44300:3000"
    volumes:
      - spacetimedb_home:/home/spacetime
    restart: unless-stopped

  # ── Auth service ─────────────────────────────────────────────────────────────
  # Host port 44301 is for local admin checks. Public clients should use the
  # auth subdomain via tunnel or reverse proxy.
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: letschat-auth
    ports:
      - "44301:44301"
    environment:
      AUTH_BIND: "0.0.0.0:44301"
      AUTH_DATABASE_URL: "sqlite:///data/auth.db"
      AUTH_JWT_SECRET: "${AUTH_JWT_SECRET}"
      LIVEKIT_API_KEY: "${LIVEKIT_API_KEY}"
      LIVEKIT_API_SECRET: "${LIVEKIT_API_SECRET}"
      MINIO_INTERNAL_ENDPOINT: "http://minio:44390"
      MINIO_PUBLIC_ENDPOINT: "${MINIO_PUBLIC_ENDPOINT}"
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY}"
      MINIO_BUCKET: "letschat-files"
    volumes:
      - auth_data:/data
    depends_on:
      - spacetimedb
      - minio
    restart: unless-stopped

  # ── LiveKit ──────────────────────────────────────────────────────────────────
  # Port 44380 is signaling (HTTP/WS). Media uses 44381 TCP/UDP and 44382 UDP.
  # Router port forwarding is required for media traffic.
  livekit:
    image: livekit/livekit-server:latest
    container_name: letschat-livekit
    command: --config /etc/livekit.yaml
    ports:
      - "44380:44380"
      - "44381:44381"
      - "44381:44381/udp"
      - "44382:44382/udp"
    volumes:
      - ./livekit/config.prod.yaml:/etc/livekit.yaml:ro
    restart: unless-stopped

  # ── MinIO (file storage) ─────────────────────────────────────────────────────
  # 44390 is S3 API for presigned file upload/download URLs.
  # 44391 is MinIO console (admin) and should be access-restricted.
  minio:
    image: minio/minio:latest
    container_name: letschat-minio
    command: server /data --address ":44390" --console-address ":44391"
    ports:
      - "44390:44390"
      - "44391:44391"
    environment:
      MINIO_ROOT_USER: "${MINIO_ACCESS_KEY}"
      MINIO_ROOT_PASSWORD: "${MINIO_SECRET_KEY}"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  # ── MinIO bucket init ────────────────────────────────────────────────────────
  # Runs once on startup and ensures the letschat-files bucket exists.
  minio-init:
    image: minio/mc:latest
    container_name: letschat-minio-init
    depends_on:
      - minio
    environment:
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY}"
    entrypoint: >
      /bin/sh -c "
        until mc alias set local http://minio:44390 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY 2>/dev/null; do
          echo 'waiting for MinIO...'; sleep 2;
        done;
        mc mb --ignore-existing local/letschat-files;
        echo 'bucket ready';
      "
    restart: "no"

  # ── Discovery endpoint for app startup ──────────────────────────────────────
  # Serves /.well-known/letschat.json so Setup → Server URL can auto-discover
  # backend endpoints without manual join-link entry.
  discovery:
    image: nginx:alpine
    container_name: letschat-discovery
    ports:
      - "44305:80"
    command: >
      /bin/sh -c "
        mkdir -p /usr/share/nginx/html/.well-known;
        cat > /usr/share/nginx/html/.well-known/letschat.json <<'JSON'
        {
          \"spacetimedb\": \"${DISCOVERY_SPACETIMEDB_URI}\",
          \"auth\": \"${DISCOVERY_AUTH_URL}\",
          \"livekit\": \"${DISCOVERY_LIVEKIT_URL}\",
          \"database\": \"${DISCOVERY_DATABASE:-letschat}\"
        }
        JSON
        exec nginx -g 'daemon off;'
      "
    restart: unless-stopped

volumes:
  spacetimedb_home:
  auth_data:
  minio_data:
