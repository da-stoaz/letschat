services:

  # ── SpacetimeDB ─────────────────────────────────────────────────────────────
  # Cloudflare Tunnel routes chat.yourdomain.com → spacetimedb:3000 (internal).
  # Port 44300 is only used for local/admin access on the host.
  spacetimedb:
    image: clockworklabs/spacetime:latest
    command: start
    container_name: letschat-spacetimedb
    ports:
      - "44300:3000"
    volumes:
      - spacetimedb_home:/home/spacetime
    restart: unless-stopped

  # ── Auth service ─────────────────────────────────────────────────────────────
  # Cloudflare Tunnel routes auth.yourdomain.com → auth-service:44301 (internal).
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: letschat-auth
    ports:
      - "44301:44301"
    environment:
      AUTH_BIND: "0.0.0.0:44301"
      AUTH_DATABASE_URL: "sqlite:///data/auth.db"
      AUTH_JWT_SECRET: "${AUTH_JWT_SECRET}"
      LIVEKIT_API_KEY: "${LIVEKIT_API_KEY}"
      LIVEKIT_API_SECRET: "${LIVEKIT_API_SECRET}"
      # Internal: auth-service → MinIO on the Docker network.
      MINIO_INTERNAL_ENDPOINT: "http://minio:44390"
      # Public: embedded in presigned URLs that clients PUT/GET to directly.
      MINIO_PUBLIC_ENDPOINT: "${MINIO_PUBLIC_ENDPOINT}"
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY}"
      MINIO_BUCKET: "letschat-files"
    volumes:
      - auth_data:/data
    depends_on:
      - spacetimedb
      - minio
    restart: unless-stopped

  # ── LiveKit ──────────────────────────────────────────────────────────────────
  # Port 44380 (HTTP/WS signaling) can go through Cloudflare Tunnel.
  # Ports 44381 (TCP) and 44382 (UDP) carry WebRTC media — they MUST be
  # port-forwarded on your router; Cloudflare Tunnels cannot proxy raw UDP.
  livekit:
    image: livekit/livekit-server:latest
    container_name: letschat-livekit
    command: --config /etc/livekit.yaml
    ports:
      - "44380:44380"         # HTTP / WS signaling
      - "44381:44381"         # RTC TCP fallback
      - "44381:44381/udp"
      - "44382:44382/udp"     # RTC UDP (primary media path)
    volumes:
      - ./livekit/config.prod.yaml:/etc/livekit.yaml:ro
    restart: unless-stopped

  # ── MinIO (file storage) ─────────────────────────────────────────────────────
  # S3 API (44390) should be accessible by clients for presigned uploads/downloads.
  # Route it through Cloudflare Tunnel (files.yourdomain.com → minio:44390).
  # Console (44391) — keep on the host only, never expose publicly.
  minio:
    image: minio/minio:latest
    container_name: letschat-minio
    command: server /data --address ":44390" --console-address ":44391"
    ports:
      - "44390:44390"
      - "44391:44391"   # admin console — bind to 127.0.0.1 in production if needed
    environment:
      MINIO_ROOT_USER: "${MINIO_ACCESS_KEY}"
      MINIO_ROOT_PASSWORD: "${MINIO_SECRET_KEY}"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  # ── MinIO bucket init ────────────────────────────────────────────────────────
  # Runs once on first start, creates the letschat-files bucket, then exits.
  minio-init:
    image: minio/mc:latest
    container_name: letschat-minio-init
    depends_on:
      - minio
    environment:
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY}"
    entrypoint: >
      /bin/sh -c "
        until mc alias set local http://minio:44390 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY 2>/dev/null; do
          echo 'waiting for MinIO...'; sleep 2;
        done;
        mc mb --ignore-existing local/letschat-files;
        echo 'bucket ready';
      "
    restart: "no"

  # ── Cloudflare Tunnel ────────────────────────────────────────────────────────
  # Configure these ingress rules in the Cloudflare Zero Trust dashboard:
  #   auth.yourdomain.com   → http://auth-service:44301
  #   chat.yourdomain.com   → http://spacetimedb:3000   (enable WebSocket)
  #   files.yourdomain.com  → http://minio:44390
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: letschat-cloudflared
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: "${CLOUDFLARE_TUNNEL_TOKEN}"
    depends_on:
      - auth-service
      - spacetimedb
      - minio
    restart: unless-stopped

volumes:
  spacetimedb_home:
  auth_data:
  minio_data:
