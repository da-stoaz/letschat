<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LetsChat</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #09090b;
      }
      #root:empty {
        display: grid;
        place-items: center;
        min-height: 100svh;
        background:
          radial-gradient(1200px 800px at 10% -20%, rgb(59 130 246 / 0.2), transparent),
          radial-gradient(900px 700px at 100% 0%, rgb(6 182 212 / 0.15), transparent);
      }
      #root:empty::after {
        content: '';
        width: 2rem;
        height: 2rem;
        border: 2px solid rgb(255 255 255 / 0.1);
        border-top-color: rgb(59 130 246 / 0.8);
        border-radius: 50%;
        animation: spin 0.75s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
