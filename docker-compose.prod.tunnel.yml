services:
  # ── Cloudflare Tunnel track ─────────────────────────────────────────────────
  # Ingress should map:
  #   auth.<domain>    -> http://core-api:8787
  #   chat.<domain>    -> http://spacetimedb:3000  (WebSocket enabled)
  #   files.<domain>   -> http://minio:44390
  #   connect.<domain> -> http://core-api:8787
  # livekit.<domain> is NOT tunnelled for media; keep 44381/44382 forwarded.
  # The core-api admin panel on port 8788 must NOT be added to the tunnel —
  # reach it via SSH port-forward from an operator workstation.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: letschat-cloudflared
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: "${CLOUDFLARE_TUNNEL_TOKEN}"
    depends_on:
      - core-api
      - spacetimedb
      - minio
    restart: unless-stopped
