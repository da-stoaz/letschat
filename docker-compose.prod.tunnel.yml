services:
  # ── Cloudflare Tunnel track ─────────────────────────────────────────────────
  # Ingress should map:
  #   auth.<domain>   -> http://auth-service:44301
  #   chat.<domain>   -> http://spacetimedb:3000  (WebSocket enabled)
  #   files.<domain>  -> http://minio:44390
  #   connect.<domain> -> http://discovery:80
  # livekit.<domain> is NOT tunnelled for media; keep 44381/44382 forwarded.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: letschat-cloudflared
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: "${CLOUDFLARE_TUNNEL_TOKEN}"
    depends_on:
      - auth-service
      - spacetimedb
      - minio
      - discovery
    restart: unless-stopped
